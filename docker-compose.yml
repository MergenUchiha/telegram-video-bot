name: telegram-video-bot
services:
  # ── Существующие сервисы (без изменений) ────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: telegram-video-bot-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: telegram-video-bot-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: telegram-video-bot-kokoro
    ports:
      - '8880:8880'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8880/docs || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

