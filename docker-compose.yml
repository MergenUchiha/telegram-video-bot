name: telegram-video-bot
services:
  redis:
    image: redis:7-alpine
    container_name: telegram-video-bot-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: telegram-video-bot-postgres
    environment:
      POSTGRES_DB: renderer
      POSTGRES_USER: renderer
      POSTGRES_PASSWORD: renderer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U renderer']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: telegram-video-bot-minio
    command: ['server', '/data', '--console-address', ':9001']
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -f http://localhost:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: telegram-video-bot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/renderer;
        exit 0;
      "

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: telegram-video-bot-kokoro
    ports:
      - '8880:8880'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8880/docs || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-video-bot-api
    command: ['sh', './docker/start-api.sh']
    env_file: .env
    environment:
      DATABASE_URL: postgresql://renderer:renderer@postgres:5432/renderer
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      S3_ENDPOINT: http://minio:9000
      KOKORO_BASE_URL: http://kokoro:8880
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-video-bot-worker
    command: ['sh', './docker/start-worker.sh']
    env_file: .env
    environment:
      DATABASE_URL: postgresql://renderer:renderer@postgres:5432/renderer
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      S3_ENDPOINT: http://minio:9000
      KOKORO_BASE_URL: http://kokoro:8880
      RENDER_TMP_DIR: /tmp/renderer
    volumes:
      - worker_tmp:/tmp/renderer
    depends_on:
      api:
        condition: service_healthy
      kokoro:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
  worker_tmp:
