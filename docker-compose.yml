name: telegram-video-bot

services:
  postgres:
    image: postgres:16-alpine
    container_name: telegram-video-bot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-renderer}
      POSTGRES_USER: ${POSTGRES_USER:-renderer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-renderer_secret}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-renderer} -d ${POSTGRES_DB:-renderer}']
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: telegram-video-bot-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: telegram-video-bot-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1']
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: telegram-video-bot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "${S3_ACCESS_KEY:-minioadmin}" "${S3_SECRET_KEY:-minioadmin}" &&
        mc mb -p local/"${S3_BUCKET:-renderer}" || true
    restart: 'no'

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: telegram-video-bot-kokoro
    ports:
      - '8880:8880'
    environment:
      PYTHONUNBUFFERED: '1'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8880/docs >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-video-bot-api
    command: ['/app/docker/start-api.sh']
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-renderer}:${POSTGRES_PASSWORD:-renderer_secret}@postgres:5432/${POSTGRES_DB:-renderer}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_TLS: '0'
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-renderer}
      S3_FORCE_PATH_STYLE: 'true'
      KOKORO_BASE_URL: http://kokoro:8880
      PORT: '3000'
      FONT_PATH: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kokoro:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/ops/health >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-video-bot-worker
    command: ['/app/docker/start-worker.sh']
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-renderer}:${POSTGRES_PASSWORD:-renderer_secret}@postgres:5432/${POSTGRES_DB:-renderer}
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_TLS: '0'
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-renderer}
      S3_FORCE_PATH_STYLE: 'true'
      KOKORO_BASE_URL: http://kokoro:8880
      RENDER_TMP_DIR: /tmp/renderer
      TMP_CLEANUP_AGE_HOURS: '2'
      INPUT_LIFECYCLE_DAYS: '3'
      OUTPUT_LIFECYCLE_DAYS: '7'
      FONT_PATH: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
    volumes:
      - worker_tmp:/tmp/renderer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kokoro:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  worker_tmp:
